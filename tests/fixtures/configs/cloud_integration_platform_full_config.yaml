applicationName: cloud-integration-platform
applicationVersion: "0.0.0-release-2025.4-20251120.144057-26"
components:
  - name: cloud-integration-platform
    mimeType: application/vnd.nc.standalone-runnable

  # Standalone docker images (image_type: image)
  - name: platform-bootstrap-cli-assembly-release-2025.4-1.8.1
